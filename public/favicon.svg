<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 橘色背景 -->
  <rect width="64" height="64" rx="14" fill="#FF9800"/>
  <!-- 貓耳（左） -->
  <polygon points="10,28 18,8 26,28" fill="#FFE0B2"/>
  <!-- 貓耳（右） -->
  <polygon points="38,28 46,8 54,28" fill="#FFE0B2"/>
  <!-- 臉 -->
  <ellipse cx="32" cy="38" rx="20" ry="18" fill="#FFE0B2"/>
  <!-- 左眼 -->
  <ellipse cx="24" cy="34" rx="3" ry="3.5" fill="#333"/>
  <!-- 右眼 -->
  <ellipse cx="40" cy="34" rx="3" ry="3.5" fill="#333"/>
  <!-- 眼睛亮點 -->
  <circle cx="25.2" cy="32.5" r="1" fill="white"/>
  <circle cx="41.2" cy="32.5" r="1" fill="white"/>
  <!-- 鼻子 -->
  <polygon points="32,40 29.5,43.5 34.5,43.5" fill="#E91E63"/>
  <!-- 嘴巴 -->
  <path d="M29.5,43.5 Q32,46 34.5,43.5" stroke="#333" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- 鬍鬚左 -->
  <line x1="8" y1="41" x2="26" y2="43" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="45" x2="26" y2="45" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 鬍鬚右 -->
  <line x1="38" y1="43" x2="56" y2="41" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="45" x2="56" y2="45" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
</svg>
